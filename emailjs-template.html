<div style="background:#ffe0eb; padding:32px 16px; font-family:'Segoe UI', system-ui, sans-serif;">
  <div style="max-width:480px; margin:0 auto; background:#fffafc; border-radius:18px; padding:28px; box-shadow:0 8px 20px rgba(214,67,110,0.15);">

    <h1 style="color:#d6436e; font-size:22px; margin:0 0 20px 0; text-align:center;">
      💕 Ela decidiu nosso próximo encontro!
    </h1>

    <table style="width:100%; border-collapse:collapse;">
      <tr>
        <td style="padding:10px 0; font-size:16px; color:#4a2545;">
          📅 <strong>Dia:</strong> {{date}}
        </td>
      </tr>
      <tr>
        <td style="padding:10px 0; font-size:16px; color:#4a2545; border-top:1px solid #ffd6e5;">
          🎉 <strong>Programa:</strong> {{activity}}
        </td>
      </tr>
      <tr>
        <td style="padding:10px 0; font-size:16px; color:#4a2545; border-top:1px solid #ffd6e5;">
          🕒 <strong>Horário:</strong> {{time}}
        </td>
      </tr>
    </table>

    <p style="text-align:center; font-size:18px; color:#d6436e; font-weight:600; margin-top:24px;">
      Bora marcar! 💕
    </p>

  </div>
</div>
