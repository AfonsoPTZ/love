<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vem comigo?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="music-player" class="music-player">
  <button id="music-prev" class="music-btn" aria-label="Anterior">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
  </button>

  <div class="music-info">
    <span id="music-track-name" class="music-track-name">carregando...</span>
    <div id="music-progress" class="music-progress">
      <div id="music-progress-bar" class="music-progress-bar">
        <div class="music-progress-thumb"></div>
      </div>
    </div>
  </div>

  <button id="music-playpause" class="music-btn music-btn-main" aria-label="Play/Pause">
    <svg id="icon-play" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    <svg id="icon-pause" viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="display:none;"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
  </button>

  <button id="music-next" class="music-btn" aria-label="Próxima">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
  </button>

  <button id="music-playlist-btn" class="music-btn" aria-label="Abrir playlist">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M4 6h13v2H4zm0 5h13v2H4zm0 5h9v2H4zM19 10v6.28a2 2 0 1 0 1 1.72V12h2v-2z"/></svg>
  </button>
</div>

<div id="playlist-panel" class="playlist-panel">
  <div class="playlist-header">
    <span class="playlist-title">Anjo q mora ao meu lado</span>
    <button id="playlist-close-btn" class="music-btn" aria-label="Fechar playlist">✕</button>
  </div>
  <div id="playlist-list" class="playlist-list"></div>
</div>
<div id="playlist-backdrop" class="playlist-backdrop"></div>

<audio id="audio-player" preload="metadata"></audio>

<div id="app">

  <!-- TELA 1: pergunta inicial -->
  <section id="screen-start" class="screen active">
    <h1 class="big-question">Topa mais um encontro cmg? 💕</h1>
    <div class="btn-row">
      <button id="btn-yes" class="btn btn-yes">Sim</button>
      <button id="btn-no" class="btn btn-no">Não</button>
    </div>
  </section>

  <!-- TELA 2: transição fofa -->
  <section id="screen-transition" class="screen">
    <p id="transition-text" class="transition-text"></p>
  </section>

  <!-- TELA 3: quiz -->
  <section id="screen-quiz" class="screen">
    <button id="quiz-back-btn" class="quiz-back-btn">‹ voltar</button>
    <div class="quiz-progress">
      <div id="quiz-progress-bar" class="quiz-progress-bar"></div>
    </div>
    <div id="quiz-content" class="quiz-content"></div>
  </section>

  <!-- TELA 4: resultado -->
  <section id="screen-result" class="screen">
    <div id="result-content" class="result-content"></div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="script.js"></script>
</body>
</html>
